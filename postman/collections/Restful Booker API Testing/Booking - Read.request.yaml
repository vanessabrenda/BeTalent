$kind: http-request
name: Booking - Read
url: "{{baseUrl}}/booking/{{bookingId}}"
method: GET
scripts:
  - type: beforeRequest
    code: "if (!pm.environment.get(\"bookingId\")) {\r

      \    throw new Error(\"Variável bookingId não está definida. Crie uma reserva primeiro.\");\r

      }"
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"Status code é 200\", function () {\r

      \    pm.expect(pm.response.code).to.eql(200);\r

      });\r

      \r

      pm.test(\"Resposta contém firstname\", function () {\r

      \    if (pm.response.headers.get(\"Content-Type\").includes(\"application/json\")) {\r

      \        var jsonData = pm.response.json();\r

      \        pm.expect(jsonData).to.have.property(\"firstname\");\r

      \    } else {\r

      \        pm.expect(pm.response.text()).to.not.be.empty;\r

      \    }\r

      });"
    language: text/javascript
order: 4000
