$kind: http-request
name: Booking - Create
url: "{{baseUrl}}/booking"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: text
  content: '{ "firstname": "Vanessa", "lastname": "Aires", "totalprice": 20, "depositpaid": true, "bookingdates": { "checkin": "2026-05-15", "checkout": "2026-05-20" }, "additionalneeds": "Breakfast" }'
scripts:
  - type: afterResponse
    code: |
      pm.test("Status code é 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Resposta contém bookingid", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("bookingid");
          pm.environment.set("bookingId", jsonData.bookingid);
      });
    language: text/javascript
order: 3000
